<!doctype html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />
        %sveltekit.head%
    </head>
    <body class="bg-stone-50" data-sveltekit-preload-data="hover">
        <div class="contents">%sveltekit.body%</div>
        <script>
            for (const node of document.querySelectorAll("img")) {
                node.addEventListener("error", (event) => {
                    event.currentTarget.dataset.errored = "";
                });
            }
        </script>
    </body>
</html>
